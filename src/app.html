<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#111113" />
	<meta name="description" content="Madmail server administration dashboard" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<link rel="manifest" href="/manifest.json" />
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
	<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
	<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
	<meta name="apple-mobile-web-app-title" content="Madmail" />
	<!-- Design tokens & surfaces: src/lib/styles/global.scss (via routes/layout.css) -->
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<script>
		(function () {
			var m = localStorage.getItem('madmail_theme');
			var mode = m === 'light' ? 'light' : 'dark';
			document.documentElement.setAttribute('data-theme', mode);
			var meta = document.querySelector('meta[name="theme-color"]');
			if (meta) meta.setAttribute('content', mode === 'light' ? '#f8f9fa' : '#111113');
		})();
	</script>
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
